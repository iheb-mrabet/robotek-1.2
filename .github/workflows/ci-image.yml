name: Build CI image

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - src/**/package.xml
      - .github/workflows/ci-image.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_IMAGE: ghcr.io/${{ github.repository }}-ci

jobs:
  build-and-publish:
    permissions:
      contents: read
      packages: write
    name: Build and publish ROS CI image
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.CI_IMAGE }}:jazzy
            ${{ env.CI_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=ros-ci-image
          cache-to: type=gha,mode=max,scope=ros-ci-image
          provenance: false
