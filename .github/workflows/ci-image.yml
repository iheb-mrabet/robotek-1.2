name: Build CI image

on:
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile
      - src/**/package.xml
      - scripts/hadolint.sh
      - .github/workflows/ci-image.yml

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_IMAGE: ghcr.io/${{ github.repository }}-ci
  LOCAL_IMAGE: robotek-ci:candidate

jobs:
  build-scan-publish:
    name: Build, scan and publish ROS CI image
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check Dockerfiles with Hadolint
        run: bash scripts/hadolint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          pull: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha,scope=ros-ci-image
          cache-to: type=gha,mode=max,scope=ros-ci-image
          provenance: false

      - name: Scan CI image before publication
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          format: table
          output: trivy-ci-image.txt
          exit-code: 1

      - name: Upload CI image scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-ci-image-${{ github.run_id }}
          path: trivy-ci-image.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish validated CI image
        shell: bash
        run: |
          set -euo pipefail

          JAZZY_TAG="${CI_IMAGE}:jazzy"
          SHA_TAG="${CI_IMAGE}:${GITHUB_SHA}"

          docker tag "${LOCAL_IMAGE}" "${JAZZY_TAG}"
          docker tag "${LOCAL_IMAGE}" "${SHA_TAG}"

          docker push "${JAZZY_TAG}"
          docker push "${SHA_TAG}"

      - name: CI image summary
        shell: bash
        run: |
          {
            echo "## ROS CI Image"
            echo
            echo "CI image build passed."
            echo "Trivy image scan passed."
            echo
            echo "Published images:"
            echo '```text'
            echo "${CI_IMAGE}:jazzy"
            echo "${CI_IMAGE}:${GITHUB_SHA}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"