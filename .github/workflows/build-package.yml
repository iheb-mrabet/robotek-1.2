name: Runtime Image Delivery

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-runtime
  LOCAL_IMAGE: robotek-runtime:ci

jobs:
  build-validate-publish:
    name: Build, Validate and Publish Runtime Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Dockerfiles with Hadolint
        run: bash scripts/hadolint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          flavor: |
            latest=auto

          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build runtime image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          load: true
          push: false
          tags: ${{ env.LOCAL_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

          cache-from: type=gha,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image

      - name: Validate runtime image
        run: bash scripts/validate_runtime_image.sh "${LOCAL_IMAGE}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish validated image tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue

            echo "Publishing ${tag}"

            docker tag "${LOCAL_IMAGE}" "${tag}"
            docker push "${tag}"
          done <<< "${TAGS}"

      - name: Delivery summary
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          {
            echo "## Runtime Image Delivery"
            echo
            echo "Hadolint passed."
            echo "Runtime-image validation passed."
            echo
            echo "Published tags:"
            echo '```text'
            printf '%s\n' "${TAGS}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"