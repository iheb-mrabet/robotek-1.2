name: Runtime Image Delivery

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-runtime
  LOCAL_IMAGE: robotek-runtime:ci

jobs:
  build-validate-publish:
    name: Build, Validate, Sign, Attest and Publish Runtime Image
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check Dockerfiles with Hadolint
        run: bash scripts/hadolint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate final image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          flavor: |
            latest=auto

          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build runtime image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          load: true
          push: false
          pull: true
          tags: ${{ env.LOCAL_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image

      - name: Validate runtime image
        shell: bash
        run: |
          set -euo pipefail

          bash scripts/validate_runtime_image.sh \
            "${LOCAL_IMAGE}"

      - name: Prepare delivery evidence directory
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p reports/delivery

      - name: Generate pre-publication Trivy JSON report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          scan-type: image
          scanners: vuln
          format: json
          output: reports/delivery/trivy-runtime.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 0

      - name: Generate pre-publication Trivy text report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          scan-type: image
          scanners: vuln
          format: table
          output: reports/delivery/trivy-runtime.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 0

      - name: Upload pre-publication scan evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-prepublish-scan-${{ github.run_number }}
          path: |
            reports/delivery/trivy-runtime.json
            reports/delivery/trivy-runtime.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce vulnerability policy before registry upload
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          scan-type: image
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push secure candidate image
        id: candidate
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${REGISTRY}/${IMAGE_NAME}"

          CANDIDATE_TAG="${IMAGE}:candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          echo "Pushing validated candidate:"
          echo "${CANDIDATE_TAG}"

          docker tag \
            "${LOCAL_IMAGE}" \
            "${CANDIDATE_TAG}"

          docker push \
            "${CANDIDATE_TAG}"

          DIGEST="$(
            docker buildx imagetools inspect \
              "${CANDIDATE_TAG}" |
            awk '/^Digest:/ {print $2; exit}'
          )"

          if [[ -z "${DIGEST}" ]]; then
            echo "Could not determine candidate digest." >&2
            exit 1
          fi

          if [[ ! "${DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "Invalid image digest: ${DIGEST}" >&2
            exit 1
          fi

          IMAGE_REFERENCE="${IMAGE}@${DIGEST}"

          echo "Candidate tag: ${CANDIDATE_TAG}"
          echo "Immutable reference: ${IMAGE_REFERENCE}"

          echo "image=${IMAGE}" \
            >> "${GITHUB_OUTPUT}"

          echo "digest=${DIGEST}" \
            >> "${GITHUB_OUTPUT}"

          echo "reference=${IMAGE_REFERENCE}" \
            >> "${GITHUB_OUTPUT}"

          echo "candidate_tag=${CANDIDATE_TAG}" \
            >> "${GITHUB_OUTPUT}"

          printf '%s\n' \
            "${CANDIDATE_TAG}" \
            > reports/delivery/candidate-reference.txt

          printf '%s\n' \
            "${IMAGE_REFERENCE}" \
            > reports/delivery/image-reference.txt

      - name: Generate delivery metadata
        shell: bash
        run: |
          set -euo pipefail

          bash scripts/generate_delivery_metadata.sh \
            "${{ steps.candidate.outputs.image }}" \
            "${{ steps.candidate.outputs.digest }}" \
            "${GITHUB_REF_NAME}"

      - name: Display delivery metadata
        run: cat reports/delivery/metadata.json

      - name: Install Syft
        shell: bash
        run: |
          set -euo pipefail

          curl -sSfL https://get.anchore.io/syft |
            sudo sh -s -- \
              -b /usr/local/bin \
              v1.44.0

          syft version

      - name: Generate package-focused runtime SBOMs
        env:
          IMAGE_REFERENCE: ${{ steps.candidate.outputs.reference }}
          SYFT_FILE_METADATA_SELECTION: none
          SYFT_RELATIONSHIPS_PACKAGE_FILE_OWNERSHIP: "false"
        shell: bash
        run: |
          set -euo pipefail

          syft "registry:${IMAGE_REFERENCE}" \
            -o spdx-json=reports/delivery/sbom.spdx.json \
            -o cyclonedx-json=reports/delivery/sbom.cyclonedx.json

          test -s reports/delivery/sbom.spdx.json
          test -s reports/delivery/sbom.cyclonedx.json

          jq empty \
            reports/delivery/sbom.spdx.json

          jq empty \
            reports/delivery/sbom.cyclonedx.json

          FILE_COMPONENTS="$(
            jq '
              [
                .components[]?
                | select(.type == "file")
              ]
              | length
            ' \
              reports/delivery/sbom.cyclonedx.json
          )"

          PACKAGE_COMPONENTS="$(
            jq '
              [
                .components[]?
                | select(.type != "file")
              ]
              | length
            ' \
              reports/delivery/sbom.cyclonedx.json
          )"

          echo "Package components: ${PACKAGE_COMPONENTS}"
          echo "File components: ${FILE_COMPONENTS}"

          if (( PACKAGE_COMPONENTS == 0 )); then
            echo "The CycloneDX SBOM contains no package components." >&2
            exit 1
          fi

          if (( FILE_COMPONENTS != 0 )); then
            echo "File components were unexpectedly included in the SBOM." >&2
            exit 1
          fi

          echo "Generated package-focused SBOM sizes:"

          du -h \
            reports/delivery/sbom.spdx.json \
            reports/delivery/sbom.cyclonedx.json

      - name: Prepare validated CycloneDX attestation SBOM
        id: attestation-sbom
        shell: bash
        run: |
          set -euo pipefail

          SOURCE="reports/delivery/sbom.cyclonedx.json"

          OUTPUT="reports/delivery/sbom.attestation.cyclonedx.json"

          MAX_SIZE_BYTES=16777216

          jq -c . \
            "${SOURCE}" \
            > "${OUTPUT}"

          jq -e '
            .bomFormat == "CycloneDX" and
            (.specVersion | type == "string") and
            (.components | type == "array") and
            (.components | length > 0)
          ' \
            "${OUTPUT}" \
            > /dev/null

          SBOM_SIZE="$(
            stat -c '%s' \
              "${OUTPUT}"
          )"

          SPEC_VERSION="$(
            jq -r '.specVersion' \
              "${OUTPUT}"
          )"

          COMPONENT_COUNT="$(
            jq '.components | length' \
              "${OUTPUT}"
          )"

          PREDICATE_TYPE="https://cyclonedx.org/bom/v${SPEC_VERSION}"

          echo "CycloneDX specification: ${SPEC_VERSION}"
          echo "Predicate type: ${PREDICATE_TYPE}"
          echo "Component count: ${COMPONENT_COUNT}"
          echo "Attestation SBOM size: ${SBOM_SIZE} bytes"

          if (( SBOM_SIZE > MAX_SIZE_BYTES )); then
            echo "CycloneDX SBOM exceeds the 16 MiB attestation limit." >&2
            exit 1
          fi

          echo "predicate_type=${PREDICATE_TYPE}" \
            >> "${GITHUB_OUTPUT}"

          echo "size_bytes=${SBOM_SIZE}" \
            >> "${GITHUB_OUTPUT}"

          echo "component_count=${COMPONENT_COUNT}" \
            >> "${GITHUB_OUTPUT}"

          jq -n \
            --arg format "CycloneDX" \
            --arg specification "${SPEC_VERSION}" \
            --arg predicate_type "${PREDICATE_TYPE}" \
            --argjson size_bytes "${SBOM_SIZE}" \
            --argjson component_count "${COMPONENT_COUNT}" \
            '{
              format: $format,
              specification: $specification,
              predicate_type: $predicate_type,
              size_bytes: $size_bytes,
              component_count: $component_count
            }' \
            > reports/delivery/sbom-attestation-info.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Display Cosign version
        run: cosign version

      - name: Sign immutable runtime image with Cosign
        env:
          IMAGE_REFERENCE: ${{ steps.candidate.outputs.reference }}
        shell: bash
        run: |
          set -euo pipefail

          cosign sign \
            --yes \
            "${IMAGE_REFERENCE}"

      - name: Generate build provenance attestation
        id: provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.candidate.outputs.image }}
          subject-digest: ${{ steps.candidate.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Generate CycloneDX SBOM attestation
        id: sbom-attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.candidate.outputs.image }}
          subject-digest: ${{ steps.candidate.outputs.digest }}
          sbom-path: reports/delivery/sbom.attestation.cyclonedx.json
          push-to-registry: true
          create-storage-record: false

      - name: Store attestation evidence
        env:
          IMAGE_REFERENCE: ${{ steps.candidate.outputs.reference }}
          SBOM_PREDICATE_TYPE: ${{ steps.attestation-sbom.outputs.predicate_type }}
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          PROVENANCE_URL: ${{ steps.provenance.outputs.attestation-url }}
          SBOM_BUNDLE: ${{ steps.sbom-attestation.outputs.bundle-path }}
          SBOM_URL: ${{ steps.sbom-attestation.outputs.attestation-url }}
        shell: bash
        run: |
          set -euo pipefail

          test -s "${PROVENANCE_BUNDLE}"
          test -s "${SBOM_BUNDLE}"

          cp \
            "${PROVENANCE_BUNDLE}" \
            reports/delivery/provenance.attestation.json

          cp \
            "${SBOM_BUNDLE}" \
            reports/delivery/sbom.attestation.json

          jq -n \
            --arg image_reference "${IMAGE_REFERENCE}" \
            --arg provenance_url "${PROVENANCE_URL}" \
            --arg sbom_url "${SBOM_URL}" \
            --arg sbom_predicate_type "${SBOM_PREDICATE_TYPE}" \
            '{
              image_reference: $image_reference,
              provenance_attestation: {
                url: $provenance_url
              },
              sbom_attestation: {
                url: $sbom_url,
                predicate_type: $sbom_predicate_type
              }
            }' \
            > reports/delivery/attestations.json

      - name: Verify Cosign signature
        env:
          IMAGE_REFERENCE: ${{ steps.candidate.outputs.reference }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}"

          DELIVERY_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/build-package.yml@${GITHUB_REF}"

          OIDC_ISSUER="https://token.actions.githubusercontent.com"

          REPORT="reports/delivery/cosign-verification.json"

          IDENTITY_REPORT="reports/delivery/cosign-identity.txt"

          if cosign verify \
            --certificate-identity "${RELEASE_IDENTITY}" \
            --certificate-oidc-issuer "${OIDC_ISSUER}" \
            --output json \
            "${IMAGE_REFERENCE}" \
            > "${REPORT}"; then

            printf '%s\n' \
              "${RELEASE_IDENTITY}" \
              > "${IDENTITY_REPORT}"

          elif cosign verify \
            --certificate-identity "${DELIVERY_IDENTITY}" \
            --certificate-oidc-issuer "${OIDC_ISSUER}" \
            --output json \
            "${IMAGE_REFERENCE}" \
            > "${REPORT}"; then

            printf '%s\n' \
              "${DELIVERY_IDENTITY}" \
              > "${IDENTITY_REPORT}"

          else
            echo "Cosign signature verification failed." >&2
            exit 1
          fi

          test -s "${REPORT}"
          test -s "${IDENTITY_REPORT}"

          jq empty "${REPORT}"

      - name: Verify GitHub provenance and SBOM attestations
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REFERENCE: ${{ steps.candidate.outputs.reference }}
          SBOM_PREDICATE_TYPE: ${{ steps.attestation-sbom.outputs.predicate_type }}
        shell: bash
        run: |
          set -euo pipefail

          verify_attestation() {
            local output_file="$1"
            shift

            local attempt

            for attempt in 1 2 3 4 5 6; do
              echo "Verification attempt ${attempt}: ${output_file}"

              if "$@" > "${output_file}"; then
                test -s "${output_file}"
                return 0
              fi

              if [[ "${attempt}" -eq 6 ]]; then
                echo "Attestation verification failed." >&2
                return 1
              fi

              sleep 10
            done
          }

          verify_attestation \
            reports/delivery/github-provenance-verification.json \
            gh attestation verify \
              "oci://${IMAGE_REFERENCE}" \
              --repo "${GITHUB_REPOSITORY}" \
              --format json

          verify_attestation \
            reports/delivery/github-sbom-verification.json \
            gh attestation verify \
              "oci://${IMAGE_REFERENCE}" \
              --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "${SBOM_PREDICATE_TYPE}" \
              --format json

          jq empty \
            reports/delivery/github-provenance-verification.json

          jq empty \
            reports/delivery/github-sbom-verification.json

      - name: Promote verified image to final tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail

          : > reports/delivery/published-tags.txt

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue

            echo "Promoting verified image to ${tag}"

            docker tag \
              "${LOCAL_IMAGE}" \
              "${tag}"

            docker push \
              "${tag}"

            printf '%s\n' \
              "${tag}" \
              >> reports/delivery/published-tags.txt

          done <<< "${TAGS}"

          test -s reports/delivery/published-tags.txt

      - name: Verify final tags resolve to signed digest
        env:
          EXPECTED_DIGEST: ${{ steps.candidate.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue

            RESOLVED_DIGEST="$(
              docker buildx imagetools inspect \
                "${tag}" |
              awk '/^Digest:/ {print $2; exit}'
            )"

            echo "${tag} -> ${RESOLVED_DIGEST}"

            if [[ "${RESOLVED_DIGEST}" != "${EXPECTED_DIGEST}" ]]; then
              echo "Final tag does not reference the verified digest." >&2
              exit 1
            fi

          done < reports/delivery/published-tags.txt

      - name: Generate evidence checksums
        run: |
          bash scripts/generate_checksums.sh \
            reports/delivery

      - name: Verify evidence checksums
        shell: bash
        run: |
          set -euo pipefail

          cd reports/delivery

          sha256sum \
            --check \
            SHA256SUMS

      - name: Display generated evidence
        shell: bash
        run: |
          set -euo pipefail

          echo "Generated delivery evidence:"

          find reports/delivery \
            -maxdepth 1 \
            -type f \
            -printf '%f\n' |
            sort

          echo
          echo "Checksums:"

          cat reports/delivery/SHA256SUMS

      - name: Upload signed runtime delivery evidence
        uses: actions/upload-artifact@v7
        with:
          name: signed-runtime-delivery-evidence-${{ github.run_number }}
          path: reports/delivery/
          if-no-files-found: error
          retention-days: 30

      - name: Upload failed delivery diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: failed-runtime-delivery-diagnostics-${{ github.run_number }}
          path: reports/delivery/
          if-no-files-found: warn
          retention-days: 14

      - name: Delivery summary
        if: always()
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_REFERENCE: ${{ steps.candidate.outputs.reference }}
          PROVENANCE_URL: ${{ steps.provenance.outputs.attestation-url }}
          SBOM_URL: ${{ steps.sbom-attestation.outputs.attestation-url }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          {
            echo "## Signed and Attested Runtime Image"
            echo
            echo "Workflow result: ${JOB_STATUS}"
            echo

            echo "### Requested final tags"
            echo
            echo '```text'
            printf '%s\n' "${TAGS}"
            echo '```'
            echo

            if [[ -n "${IMAGE_REFERENCE}" ]]; then
              echo "### Immutable image"
              echo
              echo '```text'
              echo "${IMAGE_REFERENCE}"
              echo '```'
              echo
            fi

            if [[ -n "${PROVENANCE_URL}" ]]; then
              echo "### Build provenance"
              echo
              echo "${PROVENANCE_URL}"
              echo
            fi

            if [[ -n "${SBOM_URL}" ]]; then
              echo "### CycloneDX SBOM attestation"
              echo
              echo "${SBOM_URL}"
              echo
            fi

            if [[ "${JOB_STATUS}" != "success" ]]; then
              echo "Final release tags were not promoted because one or more verification stages failed."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"