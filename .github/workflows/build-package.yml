name: Runtime Image Delivery

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-runtime
  LOCAL_IMAGE: robotek-runtime:ci

jobs:
  build-validate-publish:
    name: Build, Validate, Sign and Publish Runtime Image
    runs-on: ubuntu-latest
    timeout-minutes: 75

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check Dockerfiles with Hadolint
        run: bash scripts/hadolint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          flavor: |
            latest=auto

          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build runtime image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          load: true
          push: false
          pull: true
          tags: ${{ env.LOCAL_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image

      - name: Validate runtime image
        run: |
          bash scripts/validate_runtime_image.sh "${LOCAL_IMAGE}"

      - name: Prepare delivery evidence directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/delivery

      - name: Generate pre-publication Trivy JSON report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          scan-type: image
          scanners: vuln
          format: json
          output: reports/delivery/trivy-runtime.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 0

      - name: Generate pre-publication Trivy text report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          scan-type: image
          scanners: vuln
          format: table
          output: reports/delivery/trivy-runtime.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 0

      - name: Upload pre-publication scan evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-prepublish-scan-${{ github.run_number }}
          path: |
            reports/delivery/trivy-runtime.json
            reports/delivery/trivy-runtime.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce vulnerability policy before publication
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          scan-type: image
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish validated image tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue

            echo "Publishing ${tag}"

            docker tag "${LOCAL_IMAGE}" "${tag}"
            docker push "${tag}"
          done <<< "${TAGS}"

      - name: Capture published image digest
        id: published
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail

          PRIMARY_TAG="$(
            printf '%s\n' "${TAGS}" |
            sed '/^[[:space:]]*$/d' |
            head -n 1
          )"

          if [[ -z "${PRIMARY_TAG}" ]]; then
            echo "No published image tag was generated." >&2
            exit 1
          fi

          DIGEST="$(
            docker buildx imagetools inspect "${PRIMARY_TAG}" |
            awk '/^Digest:/ {print $2; exit}'
          )"

          if [[ -z "${DIGEST}" ]]; then
            echo "Could not determine the published image digest." >&2
            exit 1
          fi

          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          REFERENCE="${IMAGE}@${DIGEST}"

          echo "Primary tag: ${PRIMARY_TAG}"
          echo "Image: ${IMAGE}"
          echo "Digest: ${DIGEST}"
          echo "Immutable reference: ${REFERENCE}"

          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "reference=${REFERENCE}" >> "${GITHUB_OUTPUT}"

          printf '%s\n' "${REFERENCE}" \
            > reports/delivery/image-reference.txt

      - name: Generate delivery metadata
        run: |
          bash scripts/generate_delivery_metadata.sh \
            "${{ steps.published.outputs.image }}" \
            "${{ steps.published.outputs.digest }}" \
            "${GITHUB_REF_NAME}"

      - name: Display delivery metadata
        run: |
          cat reports/delivery/metadata.json

      - name: Install Syft
        shell: bash
        run: |
          set -euo pipefail

          curl -sSfL https://get.anchore.io/syft |
            sudo sh -s -- \
              -b /usr/local/bin \
              v1.44.0

          syft version

      - name: Generate runtime image SBOMs
        env:
          IMAGE_REFERENCE: ${{ steps.published.outputs.reference }}
        shell: bash
        run: |
          set -euo pipefail

          syft "registry:${IMAGE_REFERENCE}" \
            -o spdx-json=reports/delivery/sbom.spdx.json \
            -o cyclonedx-json=reports/delivery/sbom.cyclonedx.json

          test -s reports/delivery/sbom.spdx.json
          test -s reports/delivery/sbom.cyclonedx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Display Cosign version
        run: cosign version

      - name: Sign immutable runtime image with Cosign
        env:
          IMAGE_REFERENCE: ${{ steps.published.outputs.reference }}
        shell: bash
        run: |
          set -euo pipefail

          cosign sign \
            --yes \
            "${IMAGE_REFERENCE}"

      - name: Generate build provenance attestation
        id: provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.published.outputs.image }}
          subject-digest: ${{ steps.published.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Generate SPDX SBOM attestation
        id: sbom-attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.published.outputs.image }}
          subject-digest: ${{ steps.published.outputs.digest }}
          sbom-path: reports/delivery/sbom.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Store attestation evidence
        env:
          IMAGE_REFERENCE: ${{ steps.published.outputs.reference }}
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          PROVENANCE_URL: ${{ steps.provenance.outputs.attestation-url }}
          SBOM_BUNDLE: ${{ steps.sbom-attestation.outputs.bundle-path }}
          SBOM_URL: ${{ steps.sbom-attestation.outputs.attestation-url }}
        shell: bash
        run: |
          set -euo pipefail

          test -s "${PROVENANCE_BUNDLE}"
          test -s "${SBOM_BUNDLE}"

          cp \
            "${PROVENANCE_BUNDLE}" \
            reports/delivery/provenance.attestation.json

          cp \
            "${SBOM_BUNDLE}" \
            reports/delivery/sbom.attestation.json

          jq -n \
            --arg image_reference "${IMAGE_REFERENCE}" \
            --arg provenance_url "${PROVENANCE_URL}" \
            --arg sbom_url "${SBOM_URL}" \
            '{
              image_reference: $image_reference,
              provenance_attestation: $provenance_url,
              sbom_attestation: $sbom_url
            }' \
            > reports/delivery/attestations.json

      - name: Verify Cosign signature
        env:
          IMAGE_REFERENCE: ${{ steps.published.outputs.reference }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}"
          DELIVERY_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/build-package.yml@${GITHUB_REF}"
          OIDC_ISSUER="https://token.actions.githubusercontent.com"
          REPORT="reports/delivery/cosign-verification.json"
          IDENTITY_REPORT="reports/delivery/cosign-identity.txt"

          if cosign verify \
            --certificate-identity "${RELEASE_IDENTITY}" \
            --certificate-oidc-issuer "${OIDC_ISSUER}" \
            --output json \
            "${IMAGE_REFERENCE}" \
            > "${REPORT}"; then

            printf '%s\n' "${RELEASE_IDENTITY}" \
              > "${IDENTITY_REPORT}"

          elif cosign verify \
            --certificate-identity "${DELIVERY_IDENTITY}" \
            --certificate-oidc-issuer "${OIDC_ISSUER}" \
            --output json \
            "${IMAGE_REFERENCE}" \
            > "${REPORT}"; then

            printf '%s\n' "${DELIVERY_IDENTITY}" \
              > "${IDENTITY_REPORT}"

          else
            echo "Cosign signature verification failed." >&2
            exit 1
          fi

          test -s "${REPORT}"
          test -s "${IDENTITY_REPORT}"
          jq empty "${REPORT}"

      - name: Verify GitHub provenance and SBOM attestations
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REFERENCE: ${{ steps.published.outputs.reference }}
        shell: bash
        run: |
          set -euo pipefail

          verify_attestation() {
            local output_file="$1"
            shift

            local attempt

            for attempt in 1 2 3 4 5 6; do
              echo "Verification attempt ${attempt} for ${output_file}"

              if "$@" > "${output_file}"; then
                test -s "${output_file}"
                return 0
              fi

              if [[ "${attempt}" -eq 6 ]]; then
                echo "Attestation verification failed after ${attempt} attempts." >&2
                return 1
              fi

              sleep 10
            done
          }

          verify_attestation \
            reports/delivery/github-provenance-verification.json \
            gh attestation verify \
              "oci://${IMAGE_REFERENCE}" \
              --repo "${GITHUB_REPOSITORY}" \
              --format json

          verify_attestation \
            reports/delivery/github-sbom-verification.json \
            gh attestation verify \
              "oci://${IMAGE_REFERENCE}" \
              --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://spdx.dev/Document/v2.3" \
              --format json

          jq empty \
            reports/delivery/github-provenance-verification.json

          jq empty \
            reports/delivery/github-sbom-verification.json

      - name: Generate evidence checksums
        run: |
          bash scripts/generate_checksums.sh reports/delivery

      - name: Verify evidence checksums
        shell: bash
        run: |
          set -euo pipefail

          cd reports/delivery
          sha256sum --check SHA256SUMS

      - name: Display generated evidence
        shell: bash
        run: |
          set -euo pipefail

          echo "Generated delivery evidence:"

          find reports/delivery \
            -maxdepth 1 \
            -type f \
            -printf '%f\n' |
            sort

          echo
          echo "Checksums:"
          cat reports/delivery/SHA256SUMS

      - name: Upload signed runtime delivery evidence
        uses: actions/upload-artifact@v7
        with:
          name: signed-runtime-delivery-evidence-${{ github.run_number }}
          path: reports/delivery/
          if-no-files-found: error
          retention-days: 30

      - name: Delivery summary
        if: always()
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_REFERENCE: ${{ steps.published.outputs.reference }}
          PROVENANCE_URL: ${{ steps.provenance.outputs.attestation-url }}
          SBOM_URL: ${{ steps.sbom-attestation.outputs.attestation-url }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          {
            echo "## Signed Runtime Image Delivery"
            echo
            echo "Workflow result: ${JOB_STATUS}"
            echo
            echo "### Generated tags"
            echo
            echo '```text'
            printf '%s\n' "${TAGS}"
            echo '```'
            echo

            if [[ -n "${IMAGE_REFERENCE}" ]]; then
              echo "### Published immutable image"
              echo
              echo '```text'
              echo "${IMAGE_REFERENCE}"
              echo '```'
              echo
            fi

            if [[ -n "${PROVENANCE_URL}" ]]; then
              echo "### Build provenance"
              echo
              echo "${PROVENANCE_URL}"
              echo
            fi

            if [[ -n "${SBOM_URL}" ]]; then
              echo "### SBOM attestation"
              echo
              echo "${SBOM_URL}"
              echo
            fi

            if [[ -z "${IMAGE_REFERENCE}" ]]; then
              echo "The image was not published because a validation or security gate failed."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"