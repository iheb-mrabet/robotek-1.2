name: Runtime Image Delivery

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-runtime
  LOCAL_IMAGE: robotek-runtime:ci

jobs:
  build-validate-publish:
    name: Build, Validate and Publish Runtime Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Dockerfiles with Hadolint
        run: bash scripts/hadolint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          flavor: |
            latest=auto

          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build runtime image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          load: true
          push: false
          tags: ${{ env.LOCAL_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=runtime-image
          cache-to: type=gha,mode=max,scope=runtime-image

      - name: Validate runtime image
        run: |
          bash scripts/validate_runtime_image.sh "${LOCAL_IMAGE}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish validated image tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue

            echo "Publishing ${tag}"

            docker tag "${LOCAL_IMAGE}" "${tag}"
            docker push "${tag}"
          done <<< "${TAGS}"

      - name: Capture published image digest
        id: published
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail

          PRIMARY_TAG="$(
            printf '%s\n' "${TAGS}" |
            sed '/^[[:space:]]*$/d' |
            head -n 1
          )"

          if [[ -z "${PRIMARY_TAG}" ]]; then
            echo "No published image tag was generated." >&2
            exit 1
          fi

          DIGEST="$(
            docker buildx imagetools inspect "${PRIMARY_TAG}" |
            awk '/^Digest:/ {print $2; exit}'
          )"

          if [[ -z "${DIGEST}" ]]; then
            echo "Could not determine the published image digest." >&2
            exit 1
          fi

          echo "Primary tag: ${PRIMARY_TAG}"
          echo "Digest: ${DIGEST}"

          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "reference=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" \
            >> "${GITHUB_OUTPUT}"

      - name: Generate delivery metadata
        run: |
          bash scripts/generate_delivery_metadata.sh \
            "${{ steps.published.outputs.image }}" \
            "${{ steps.published.outputs.digest }}" \
            "${GITHUB_REF_NAME}"

      - name: Display delivery metadata
        run: |
          cat reports/delivery/metadata.json

      - name: Delivery summary
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_REFERENCE: ${{ steps.published.outputs.reference }}
        shell: bash
        run: |
          {
            echo "## Runtime Image Delivery"
            echo
            echo "Hadolint passed."
            echo "Runtime-image validation passed."
            echo "Runtime image was published successfully."
            echo
            echo "### Published tags"
            echo
            echo '```text'
            printf '%s\n' "${TAGS}"
            echo '```'
            echo
            echo "### Immutable image"
            echo
            echo '```text'
            echo "${IMAGE_REFERENCE}"
            echo '```'
            echo
            echo "### Delivery metadata"
            echo
            echo '```text'
            echo "reports/delivery/metadata.json"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"